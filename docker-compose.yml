version: '3.8'

services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: gf-menu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-girlfriend_menu}
      MYSQL_USER: ${MYSQL_USER:-menu_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-menu123}
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gf-menu-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-girlfriend_menu}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-menu_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-menu123}
      JWT_SECRET: ${JWT_SECRET:-girlfriend-menu-secret-key-2024-love-you-forever-secure}
      TZ: Asia/Shanghai
      JAVA_OPTS: -Dfile.encoding=UTF-8
    depends_on:
      mysql:
        condition: service_healthy

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: gf-menu-admin
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: gf-menu-user
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  mysql_data:
